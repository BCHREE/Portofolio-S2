{% extends 'base.html' %}
{% load static %}

{% block title %}Feedback & Contact - Azka Bachri{% endblock %}

{% block content %}
<div class="container">
    <h2 class="title-section">Get In Touch</h2>
    <div class="feedback-grid">
        
        <div class="form-wrapper">
            <form>
                <input type="text" name="nama" placeholder="Nama Lengkap" required>
                <input type="email" name="email" placeholder="Alamat Email" required>
                <textarea name="pesan" rows="6" placeholder="Tulis masukan, kritik atau pesan kolaborasi di sini..." required></textarea>
                <button type="submit" class="btn-gold" style="border: none; cursor: pointer;">Kirim Pesan</button>
            </form>
        </div>

        <div class="contact-info">
            <h3>Hubungi Langsung</h3>
            <div class="contact-item">
                <i class="fa-brands fa-whatsapp"></i>
                <span>085213299212</span>
            </div>
            <div class="contact-item">
                <i class="fa-solid fa-envelope"></i>
                <span>kaa.bachri@gmail.com</span>
            </div>
            <div class="contact-item">
                <i class="fa-brands fa-instagram"></i>
                <span>@bchreeflow</span>
            </div>
        </div>

    </div>
</div>
{% endblock %}
